# Lint config for the Lint stage (ruff check src tests).
line-length = 100
target-version = "py310"

[lint]
# pyflakes (F) + pycodestyle errors (E) + isort (I) + bugbear (B) + pyupgrade (UP)
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]  # line length handled by the formatter, not enforced hard
